name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.7.0). Must match lib/rails_error_dashboard/version.rb on main. Used only to confirm intent."
        required: true
        type: string

permissions:
  contents: write      # Create releases and tags
  pull-requests: write # Create/update release PRs
  id-token: write      # Required for trusted publishing (OIDC)

jobs:
  # Automated path: release-please opens/merges release PRs and publishes
  # on successful merge. Triggered by every push to main.
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history for changelog generation

      # Step 1: Release Please manages versioning and changelog
      # This will create/update a Release PR when commits are pushed to main
      # When the Release PR is merged, it will create a GitHub release
      - name: Create Release PR or Publish Release
        uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      # Steps below only run if a release was created (Release PR was merged)

      - name: Set up Ruby
        if: ${{ steps.release.outputs.release_created }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests before publishing
        if: ${{ steps.release.outputs.release_created }}
        run: bundle exec rspec

      - name: Run RuboCop before publishing
        if: ${{ steps.release.outputs.release_created }}
        run: bundle exec rubocop

      # Step 2: Publish to RubyGems using Trusted Publishing
      # This requires setting up a Trusted Publisher on RubyGems.org
      # See: https://guides.rubygems.org/trusted-publishing/
      - name: Publish to RubyGems
        if: ${{ steps.release.outputs.release_created }}
        uses: rubygems/release-gem@v1
        # No API key needed! Trusted publishing handles authentication via OIDC

  # Manual escape hatch: republishes the gem at the current version on main
  # WITHOUT going through release-please. Use this when:
  #   - The automated `release` job above created a tag + GitHub release but
  #     a transient failure (flaky test, network blip) blocked the publish step
  #   - Re-running the workflow won't help because release-please sees the
  #     release already exists and skips its downstream steps
  #
  # Required: the `version` input must match lib/rails_error_dashboard/version.rb
  # on the current main. This is a guardrail to confirm intent and prevent
  # accidental publishes of the wrong version.
  republish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Verify input version matches version.rb
        run: |
          file_version=$(ruby -r ./lib/rails_error_dashboard/version.rb -e 'puts RailsErrorDashboard::VERSION')
          input_version="${{ inputs.version }}"
          if [ "$file_version" != "$input_version" ]; then
            echo "::error::Input version '$input_version' does not match version.rb '$file_version'. Aborting."
            exit 1
          fi
          echo "Version match confirmed: $file_version"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run tests before publishing
        run: bundle exec rspec

      - name: Run RuboCop before publishing
        run: bundle exec rubocop

      - name: Publish to RubyGems
        uses: rubygems/release-gem@v1
